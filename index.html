<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eunnwk · Docs</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent2: #47c9ff;
      --text: #e0e0e0;
      --text-muted: #666;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 300;
      min-height: 100vh;
    }

    header {
      padding: 64px 40px 48px;
      max-width: 900px;
      margin: 0 auto;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: -1px; left: 40px;
      width: 60px; height: 2px;
      background: var(--accent);
    }

    .site-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 16px;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      font-size: 15px;
      color: var(--text-muted);
      line-height: 1.7;
    }

    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 56px 40px 80px;
    }

    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 56px;
    }

    .doc-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.15s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }

    .doc-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.2s;
    }

    .doc-card:hover {
      border-color: #444;
      transform: translateY(-2px);
    }

    .doc-card:hover::before {
      transform: scaleY(1);
    }

    .doc-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--accent2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .doc-title {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.4;
      color: #eee;
    }

    .doc-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    .doc-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #444;
      margin-top: auto;
      padding-top: 8px;
    }

    /* Empty card placeholder */
    .doc-card.placeholder {
      border-style: dashed;
      border-color: #222;
      opacity: 0.5;
      cursor: default;
      pointer-events: none;
    }

    .placeholder .doc-title { color: #555; }

    footer {
      border-top: 1px solid var(--border);
      padding: 28px 40px;
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      header, main, footer { padding-left: 20px; padding-right: 20px; }
      header { padding-top: 40px; }
      .doc-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="site-label">eunnwk / docs</div>
  <h1>가이드 <span>&</span><br>문서 목차</h1>
  <p class="subtitle">Claude가 만든 가이드 문서를 모아두는 곳입니다.</p>
</header>

<main>

  <div class="section-label">자동화 · 배포</div>
  <div class="doc-grid">

    <a href="deploy-guide.html" class="doc-card">
      <div class="doc-tag">GitHub · Deploy</div>
      <div class="doc-title">Claude → GitHub Pages 자동 배포 시스템 구축</div>
      <div class="doc-desc">deploy.sh로 미리보기 승인 후 push까지 처리하는 반자동 배포 시스템</div>
      <div class="doc-meta">2026-03-30 · 약 20분</div>
    </a>

    <div class="doc-card placeholder">
      <div class="doc-tag">Coming soon</div>
      <div class="doc-title">다음 문서가 여기에 추가됩니다</div>
      <div class="doc-desc">새 가이드를 배포하면 Claude가 이 목차에 카드를 추가합니다.</div>
    </div>

  </div>

</main>

<footer>
  <span>eunnwk.github.io/docs</span>
  <span>updated 2026-03-30</span>
</footer>

</body>
</html>
